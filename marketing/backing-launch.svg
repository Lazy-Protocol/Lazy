<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Subtle grid pattern for institutional feel -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#232d3d" stroke-width="0.5"/>
    </pattern>
    <!-- Gradient for the split bar -->
    <linearGradient id="splitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="30%" stop-color="#64748B"/>
      <stop offset="30%" stop-color="#C4A052"/>
      <stop offset="100%" stop-color="#C4A052"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#1a2332"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1920" height="3" fill="#C4A052"/>

  <!-- Header Section -->
  <g transform="translate(120, 80)">
    <!-- Lazy Logo/Brand -->
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#FAFBFC" letter-spacing="-1">LAZY</text>
    <text x="160" y="50" font-family="Inter, sans-serif" font-size="48" font-weight="300" fill="#64748B" letter-spacing="-1">PROTOCOL</text>

    <!-- Tagline -->
    <text x="0" y="85" font-family="JetBrains Mono, monospace" font-size="16" fill="#64748B" letter-spacing="2">MARKET-NEUTRAL YIELD</text>
  </g>

  <!-- Live indicator -->
  <g transform="translate(1680, 80)">
    <circle cx="0" cy="35" r="6" fill="#22c55e"/>
    <text x="16" y="40" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748B">LIVE</text>
  </g>

  <!-- Main Content Area -->

  <!-- TVL Card -->
  <g transform="translate(120, 180)">
    <rect x="0" y="0" width="800" height="280" fill="#232d3d" rx="12" ry="12"/>
    <rect x="0" y="0" width="800" height="280" fill="none" stroke="#3a4556" stroke-width="1" rx="12" ry="12"/>

    <!-- TVL Label -->
    <text x="40" y="50" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748B" letter-spacing="1">TOTAL VALUE LOCKED</text>

    <!-- TVL Value -->
    <text x="40" y="140" font-family="JetBrains Mono, monospace" font-size="72" font-weight="700" fill="#C4A052">$500,195</text>
    <text x="540" y="140" font-family="JetBrains Mono, monospace" font-size="36" fill="#C4A052" opacity="0.7">.71</text>

    <!-- USDC denomination -->
    <text x="40" y="180" font-family="JetBrains Mono, monospace" font-size="20" fill="#64748B">USDC</text>

    <!-- Verified badge -->
    <g transform="translate(40, 210)">
      <rect x="0" y="0" width="180" height="36" fill="transparent" stroke="#3a4556" stroke-width="1" rx="4" ry="4"/>
      <circle cx="20" cy="18" r="6" fill="#22c55e"/>
      <text x="36" y="24" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748B">ON-CHAIN VERIFIED</text>
    </g>
  </g>

  <!-- Stats Cards -->
  <g transform="translate(960, 180)">
    <!-- APR Card -->
    <rect x="0" y="0" width="380" height="130" fill="#232d3d" rx="12" ry="12"/>
    <rect x="0" y="0" width="380" height="130" fill="none" stroke="#3a4556" stroke-width="1" rx="12" ry="12"/>
    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748B" letter-spacing="1">CURRENT APR</text>
    <text x="30" y="95" font-family="JetBrains Mono, monospace" font-size="52" font-weight="700" fill="#C4A052">4.48%</text>
  </g>

  <g transform="translate(1380, 180)">
    <!-- Share Price Card -->
    <rect x="0" y="0" width="420" height="130" fill="#232d3d" rx="12" ry="12"/>
    <rect x="0" y="0" width="420" height="130" fill="none" stroke="#3a4556" stroke-width="1" rx="12" ry="12"/>
    <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748B" letter-spacing="1">SHARE PRICE</text>
    <text x="30" y="95" font-family="JetBrains Mono, monospace" font-size="52" font-weight="700" fill="#FAFBFC">$1.000381</text>
  </g>

  <!-- 30/70 Split Section -->
  <g transform="translate(960, 330)">
    <rect x="0" y="0" width="840" height="130" fill="#232d3d" rx="12" ry="12"/>
    <rect x="0" y="0" width="840" height="130" fill="none" stroke="#3a4556" stroke-width="1" rx="12" ry="12"/>

    <text x="30" y="35" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748B" letter-spacing="1">STRATEGY ALLOCATION</text>

    <!-- Split Bar -->
    <rect x="30" y="55" width="780" height="24" fill="#1a2332" rx="4" ry="4"/>
    <rect x="30" y="55" width="234" height="24" fill="#64748B" rx="4" ry="4"/>
    <rect x="264" y="55" width="546" height="24" fill="#C4A052" rx="4" ry="4"/>

    <!-- Labels -->
    <text x="30" y="105" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748B">30% PERP COLLATERAL</text>
    <text x="420" y="105" font-family="JetBrains Mono, monospace" font-size="14" fill="#C4A052">70% SPOT HOLDINGS</text>
  </g>

  <!-- Strategy Details Cards -->
  <g transform="translate(120, 500)">
    <!-- Perp Collateral Card -->
    <rect x="0" y="0" width="800" height="200" fill="#232d3d" rx="12" ry="12"/>
    <rect x="0" y="0" width="800" height="200" fill="none" stroke="#64748B" stroke-width="1" rx="12" ry="12"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="800" height="4" fill="#64748B" rx="0" ry="0"/>

    <text x="40" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#FAFBFC">Perp Collateral</text>
    <text x="40" y="75" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700" fill="#64748B">30%</text>

    <line x1="40" y1="100" x2="760" y2="100" stroke="#3a4556" stroke-width="1"/>

    <text x="40" y="130" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748B">DELTA HEDGING</text>
    <text x="40" y="160" font-family="Inter, sans-serif" font-size="16" fill="#FAFBFC">Shorts on Hyperliquid &amp; Lighter</text>
    <text x="40" y="185" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748B" opacity="0.7">Market-neutral positioning</text>
  </g>

  <g transform="translate(960, 500)">
    <!-- Spot Holdings Card -->
    <rect x="0" y="0" width="840" height="200" fill="#232d3d" rx="12" ry="12"/>
    <rect x="0" y="0" width="840" height="200" fill="none" stroke="#C4A052" stroke-width="1" rx="12" ry="12"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="840" height="4" fill="#C4A052" rx="0" ry="0"/>

    <text x="40" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#FAFBFC">Spot Holdings</text>
    <text x="40" y="75" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700" fill="#C4A052">70%</text>

    <line x1="40" y1="100" x2="800" y2="100" stroke="#3a4556" stroke-width="1"/>

    <text x="40" y="130" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748B">YIELD SOURCES</text>

    <!-- Yield source tags -->
    <g transform="translate(40, 145)">
      <rect x="0" y="0" width="120" height="32" fill="#1a2332" stroke="#C4A052" stroke-width="1" rx="4" ry="4"/>
      <text x="14" y="21" font-family="JetBrains Mono, monospace" font-size="13" fill="#C4A052">Pendle PT</text>
    </g>
    <g transform="translate(170, 145)">
      <rect x="0" y="0" width="160" height="32" fill="#1a2332" stroke="#C4A052" stroke-width="1" rx="4" ry="4"/>
      <text x="14" y="21" font-family="JetBrains Mono, monospace" font-size="13" fill="#C4A052">Jupiter Lending</text>
    </g>
    <g transform="translate(380, 145)">
      <rect x="0" y="0" width="180" height="32" fill="#1a2332" stroke="#C4A052" stroke-width="1" rx="4" ry="4"/>
      <text x="14" y="21" font-family="JetBrains Mono, monospace" font-size="13" fill="#C4A052">Validator Staking</text>
    </g>
  </g>

  <!-- Wallet Verification Section -->
  <g transform="translate(120, 740)">
    <rect x="0" y="0" width="1680" height="120" fill="#1a2332" stroke="#3a4556" stroke-width="1" rx="12" ry="12"/>

    <text x="40" y="40" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748B" letter-spacing="1">VERIFICATION ADDRESSES</text>

    <!-- Multisig -->
    <g transform="translate(40, 55)">
      <text x="0" y="25" font-family="Inter, sans-serif" font-size="14" fill="#64748B">Multisig:</text>
      <text x="80" y="25" font-family="JetBrains Mono, monospace" font-size="16" fill="#FAFBFC">0x0FBC...Ad666</text>
    </g>

    <!-- Vault -->
    <g transform="translate(340, 55)">
      <text x="0" y="25" font-family="Inter, sans-serif" font-size="14" fill="#64748B">Vault:</text>
      <text x="50" y="25" font-family="JetBrains Mono, monospace" font-size="16" fill="#FAFBFC">0xd53B...3805</text>
    </g>

    <!-- CTA Button -->
    <g transform="translate(1380, 45)">
      <rect x="0" y="0" width="260" height="48" fill="#C4A052" rx="4" ry="4"/>
      <text x="45" y="31" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#1a2332">VERIFY ON-CHAIN</text>
      <text x="220" y="31" font-family="Inter, sans-serif" font-size="16" fill="#1a2332">→</text>
    </g>
  </g>

  <!-- Tagline Footer -->
  <g transform="translate(120, 920)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#FAFBFC" letter-spacing="-0.5">"Don't trust us.</text>
    <text x="380" y="50" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#C4A052" letter-spacing="-0.5">Check the chain."</text>
  </g>

  <!-- Footer branding -->
  <g transform="translate(1500, 920)">
    <text x="0" y="50" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748B">lazy.money/backing</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="1077" width="1920" height="3" fill="#C4A052"/>
</svg>