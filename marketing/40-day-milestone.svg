<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: Lazy Navy -->
  <rect width="1200" height="630" fill="#1a2332"/>

  <!-- Grid texture -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand anchor, top right -->
  <text
    x="1150"
    y="60"
    font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="14"
    font-weight="400"
    fill="#64748B"
    text-anchor="end"
  >getlazy.xyz</text>

  <!-- Days label -->
  <text
    x="120"
    y="130"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="24"
    font-weight="600"
    fill="#64748B"
    letter-spacing="0.15em"
  >DAYS LIVE</text>

  <!-- 40 - hero number -->
  <text
    x="112"
    y="265"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="160"
    font-weight="700"
    fill="#FAFBFC"
    letter-spacing="-0.03em"
  >40</text>

  <!-- Share price label -->
  <text
    x="120"
    y="370"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="24"
    font-weight="600"
    fill="#64748B"
    letter-spacing="0.15em"
  >SHARE PRICE</text>

  <!-- Share price value -->
  <text
    x="112"
    y="440"
    font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="84"
    font-weight="700"
    fill="#C4A052"
  >$1.0089</text>

  <!-- Section divider -->
  <line x1="112" y1="475" x2="1088" y2="475" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Yield label -->
  <text
    x="112"
    y="520"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="24"
    font-weight="600"
    fill="#64748B"
    letter-spacing="0.15em"
  >YIELD DISTRIBUTED</text>

  <!-- Yield value -->
  <text
    x="112"
    y="570"
    font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="44"
    font-weight="700"
    fill="#C4A052"
  >$5,910</text>

  <!-- APR label -->
  <text
    x="448"
    y="520"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="24"
    font-weight="600"
    fill="#64748B"
    letter-spacing="0.15em"
  >APR</text>

  <!-- APR value -->
  <text
    x="448"
    y="570"
    font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="44"
    font-weight="700"
    fill="#C4A052"
  >8.7%</text>

  <!-- Incidents label -->
  <text
    x="784"
    y="520"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="24"
    font-weight="600"
    fill="#64748B"
    letter-spacing="0.15em"
  >INCIDENTS</text>

  <!-- Incidents value -->
  <text
    x="784"
    y="570"
    font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="44"
    font-weight="700"
    fill="#FAFBFC"
  >0</text>

</svg>
